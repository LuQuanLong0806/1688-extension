<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 320px;
        font-family: 'Microsoft YaHei', sans-serif;
        background: #f5f5f5;
      }
      .header {
        background: linear-gradient(135deg, #ff6a00, #ff4444);
        color: white;
        padding: 20px;
        text-align: center;
      }
      .header h1 {
        font-size: 18px;
        margin-bottom: 5px;
      }
      .header p {
        font-size: 12px;
        opacity: 0.9;
      }
      .content {
        padding: 15px;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-bottom: 10px;
        transition: all 0.2s;
      }
      .btn-grab {
        background: linear-gradient(135deg, #ff6a00, #ff4444);
        color: white;
      }
      .btn-grab:hover {
        transform: scale(1.02);
        box-shadow: 0 4px 12px rgba(255, 68, 68, 0.4);
      }
      .btn-grab:disabled {
        background: #ccc;
        transform: none;
        box-shadow: none;
        cursor: not-allowed;
      }
      .tips {
        background: white;
        border-radius: 8px;
        padding: 12px;
        margin-top: 10px;
      }
      .tips h3 {
        font-size: 13px;
        color: #333;
        margin-bottom: 8px;
      }
      .tips li {
        font-size: 12px;
        color: #666;
        line-height: 1.8;
      }
      .status {
        text-align: center;
        padding: 10px;
        font-size: 13px;
        color: #666;
      }
      .status.success {
        color: #52c41a;
      }
      .status.error {
        color: #ff4444;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>🔥 1688图片抓取</h1>
      <p>一键抓取商品页所有图片</p>
    </div>
    <div class="content">
      <div id="status" class="status"></div>
      <button id="grabBtn" class="btn btn-grab">🚀 开始抓取图片</button>
      <div class="tips">
        <h3>📌 使用说明</h3>
        <ul>
          <li>1. 先打开1688商品详情页</li>
          <li>2. 滚动到底部让图片加载完</li>
          <li>3. 点击上方按钮开始抓取</li>
          <li>4. 结果会在新标签页中显示</li>
        </ul>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>

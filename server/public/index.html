<!DOCTYPE html>
<html lang="zh-CN" data-theme="1688">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品采集管理平台</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="https://unpkg.com/view-design@4.7.0/dist/styles/iview.css">
  <link rel="stylesheet" href="css/theme-jd.css">
  <link rel="stylesheet" href="css/theme-1688.css">
  <link rel="stylesheet" href="css/theme-fresh.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">
    <div class="admin-layout">
      <!-- Header -->
      <header class="admin-header">
        <div class="header-left">
          <div class="header-toggle-btn" @click="sidebarCollapsed = !sidebarCollapsed" :title="sidebarCollapsed ? '展开菜单' : '收起菜单'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </div>
          <div class="header-logo">
            <svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-7 3c1.63 0 3.13.79 4 2h-4c-1.66 0-3 1.34-3 3 0 .35.07.69.18 1H7.1A5.02 5.02 0 0112 6zm0 12c-1.63 0-3.13-.79-4-2h4c1.66 0 3-1.34 3-3 0-.35-.07-.69-.18-1h2.08A5.02 5.02 0 0112 18z"/></svg>
          </div>
          <span class="header-title">商品采集管理平台</span>
          <span class="header-subtitle">1688 数据采集与管理系统</span>
          <div class="header-theme-toggle" @click="toggleTheme" :title="'切换主题: ' + themeName">
            <span>🎨</span>
            <span>{{ themeName }}</span>
          </div>
        </div>
        <div class="header-right">
          <span class="header-badge">已采集 {{ stats.total }} 条</span>
        </div>
      </header>

      <div class="admin-body">
        <!-- Sidebar -->
        <aside class="admin-sidebar" :class="{ collapsed: sidebarCollapsed }">
          <ul class="sidebar-menu">
            <li class="menu-group-title">主菜单</li>
            <li class="menu-item" :class="{ active: currentView === 'page-products' }" @click="switchView('page-products')">
              <i class="menu-icon">📦</i>
              <span class="menu-text">商品管理</span>
            </li>
            <li class="menu-item" :class="{ active: currentView === 'page-categories' }" @click="switchView('page-categories')">
              <i class="menu-icon">🏷️</i>
              <span class="menu-text">类目映射</span>
            </li>
            <!-- 图片编辑菜单已隐藏 -->
            <li class="menu-item" :class="{ active: currentView === 'page-meitu' }" @click="switchView('page-meitu')">
              <i class="menu-icon">🎨</i>
              <span class="menu-text">小秘美图</span>
            </li>
            <li class="menu-item" :class="{ active: currentView === 'page-dashboard' }" @click="switchView('page-dashboard')">
              <i class="menu-icon">📊</i>
              <span class="menu-text">仪表盘</span>
            </li>
            <li class="menu-group-title" style="margin-top:8px">系统设置</li>
            <li class="menu-item" :class="{ active: currentView === 'page-api-keys' }" @click="switchView('page-api-keys')">
              <i class="menu-icon">🔑</i>
              <span class="menu-text">AI模型配置</span>
            </li>
            <li class="menu-item" :class="{ active: currentView === 'page-word-library' }" @click="switchView('page-word-library')">
              <i class="menu-icon">📖</i>
              <span class="menu-text">词库管理</span>
            </li>
            <li class="menu-item" :class="{ active: currentView === 'page-cloud-sync' }" @click="switchView('page-cloud-sync')">
              <i class="menu-icon">☁️</i>
              <span class="menu-text">云同步</span>
            </li>
          </ul>
          <div class="sidebar-toggle" @click="sidebarCollapsed = !sidebarCollapsed" :title="sidebarCollapsed ? '展开菜单' : '收起菜单'">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path v-if="sidebarCollapsed" d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
              <path v-else d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
            </svg>
          </div>
        </aside>

        <!-- Content — dynamic component -->
        <main class="admin-content">
          <div class="page-wrap" :class="'page-wrap--' + currentView">
            <component :is="currentView" :stats="stats" :theme="theme" @switch-view="switchView" @open-detail="openDetail"></component>
          </div>
        </main>
      </div>
    </div>

    <!-- Detail Modal -->
    <detail-modal ref="detailModal" :visible.sync="showDetail" :detail="detailData" @status-changed="onDetailStatusChanged"></detail-modal>

    <!-- 拼图工具弹窗 -->
    <modal v-model="showCollageModal" class="meitu-modal-fullscreen" fullscreen footer-hide
      title="拼图工具" @on-cancel="showCollageModal=false">
      <page-meitu v-if="showCollageModal"></page-meitu>
    </modal>

    <!-- Thumb Hover Preview -->
    <thumb-preview ref="thumbPreview"></thumb-preview>

    <!-- Image Full Preview -->
    <div class="img-preview-overlay" v-if="previewVisible" @click.self="closePreview">
      <button class="img-preview-close" @click="closePreview">&times;</button>
      <button class="img-preview-nav prev" v-if="previewIdx > 0" @click.stop="previewIdx--">&lsaquo;</button>
      <img :src="previewList[previewIdx]" />
      <button class="img-preview-nav next" v-if="previewIdx < previewList.length - 1" @click.stop="previewIdx++">&rsaquo;</button>
      <div class="img-preview-counter">{{ previewIdx + 1 }} / {{ previewList.length }}</div>
    </div>
  </div>

  <!-- CDN -->
  <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.min.js"></script>
  <script src="https://unpkg.com/view-design@4.7.0/dist/iview.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <link rel="stylesheet" href="css/meitu-editor.css">
  <link rel="stylesheet" href="css/meitu-tools.css">
  <!-- Components (must load before app.js) -->
  <script src="js/components/thumb-preview.js"></script>
  <script src="js/components/category-picker.js"></script>
  <script src="js/components/detail-modal.js"></script>
  <script src="js/components/dashboard.js"></script>
  <script src="js/components/product-list.js"></script>
  <script src="js/components/category-page.js"></script>
  <script src="js/components/page-editor.js"></script>
  <script src="js/meitu-collage.js"></script>
  <script src="js/meitu-text-cleaner.js?v=20260603"></script>
  <script src="js/components/page-meitu.js?v=20260603"></script>
  <script src="js/components/page-api-keys.js?v=20260603"></script>
  <script src="js/components/page-word-library.js"></script>
  <script src="js/components/page-cloud-sync.js"></script>
  <!-- Main app -->
  <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品采集管理</title>
  <link rel="stylesheet" href="https://unpkg.com/view-design@4.7.0/dist/styles/iview.css">
  <style>
    body { background: #f0f2f5; padding: 20px; }
    .page-header { margin-bottom: 20px; }
    .page-header h1 { font-size: 22px; font-weight: 600; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .search-bar { display: flex; gap: 8px; align-items: center; }
    .title-text { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; word-break: break-all; }
    .img-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .img-grid img { width: 100px; height: 100px; object-fit: cover; border-radius: 4px; border: 1px solid #f0f0f0; cursor: pointer; }
    .img-grid img:hover { transform: scale(1.5); z-index: 10; position: relative; }
    .attr-tag { margin-right: 4px; }
    .detail-section { margin-bottom: 20px; }
    .detail-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #555; }
    .detail-section .info-row { display: flex; gap: 8px; margin-bottom: 4px; font-size: 14px; }
    .detail-section .info-label { color: #999; min-width: 70px; }
    .detail-section .info-value { color: #333; word-break: break-all; }
    .sku-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .sku-table th, .sku-table td { padding: 6px 10px; border: 1px solid #e8e8e8; text-align: center; }
    .sku-table th { background: #fafafa; }
    .sku-table img { width: 40px; height: 40px; object-fit: cover; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="page-header">
      <h1>商品采集管理</h1>
    </div>

    <div class="toolbar">
      <div class="search-bar">
        <i-input v-model="keyword" placeholder="搜索标题..." style="width: 220px" @on-enter="loadList(1)">
          <icon type="ios-search" slot="prefix"></icon>
        </i-input>
        <i-select v-model="statusFilter" style="width: 120px" @on-change="loadList(1)">
          <i-option value="all">全部状态</i-option>
          <i-option value="0">未使用</i-option>
          <i-option value="1">已使用</i-option>
        </i-select>
        <i-button type="primary" icon="ios-search" @click="loadList(1)">搜索</i-button>
      </div>
      <i-button type="error" :disabled="selectedIds.length === 0" @click="batchDelete">
        批量删除{{ selectedIds.length ? ' (' + selectedIds.length + ')' : '' }}
      </i-button>
    </div>

    <i-table :columns="columns" :data="list" :loading="loading" stripe border
      @on-selection-change="onSelectionChange" style="margin-bottom: 16px;">
    </i-table>

    <div style="text-align: center;">
      <page :total="total" :current="page" :page-size="pageSize" show-total show-elevator
        @on-change="onPageChange" @on-page-size-change="onPageSizeChange" />
    </div>

    <!-- 详情弹窗 -->
    <modal v-model="showDetail" :title="detail ? (detail.title || ('商品 #' + detail.id)) : '商品详情'" width="800" footer-hide>
      <template v-if="detail">
        <div class="detail-section">
          <h3>基本信息</h3>
          <div class="info-row"><span class="info-label">ID</span><span class="info-value">{{ detail.id }}</span></div>
          <div class="info-row"><span class="info-label">来源</span><span class="info-value">{{ detail.source_url || '-' }}</span></div>
          <div class="info-row"><span class="info-label">标题</span><span class="info-value">{{ detail.title || '-' }}</span></div>
        </div>

        <div class="detail-section" v-if="detail.main_images && detail.main_images.length">
          <h3>主图 ({{ detail.main_images.length }})</h3>
          <div class="img-grid">
            <img v-for="(url, i) in detail.main_images" :key="'main'+i" :src="url" loading="lazy" />
          </div>
        </div>

        <div class="detail-section" v-if="detail.desc_images && detail.desc_images.length">
          <h3>描述图 ({{ detail.desc_images.length }})</h3>
          <div class="img-grid">
            <img v-for="(url, i) in detail.desc_images" :key="'desc'+i" :src="url" loading="lazy" />
          </div>
        </div>

        <div class="detail-section" v-if="detail.attrs && detail.attrs.length">
          <h3>属性</h3>
          <tag v-for="(a, i) in detail.attrs" :key="'attr'+i" class="attr-tag">{{ a }}</tag>
        </div>

        <div class="detail-section" v-if="detail.skus && detail.skus.length">
          <h3>SKU ({{ detail.skus.length }})</h3>
          <table class="sku-table">
            <thead><tr><th>预览图</th><th>SKU</th><th>价格</th><th>尺寸(长宽高)</th><th>重量</th></tr></thead>
            <tbody>
              <tr v-for="(sku, i) in detail.skus" :key="'sku'+i">
                <td><img v-if="sku.image" :src="sku.image" loading="lazy" /></td>
                <td>{{ sku.sku || '-' }}</td>
                <td>{{ sku.price || '-' }}</td>
                <td>{{ sku.dimensions ? sku.dimensions.join(' x ') : '-' }}</td>
                <td>{{ sku.weight != null ? sku.weight : '-' }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </template>
      <div style="text-align: right; margin-top: 16px;">
        <i-button @click="copyUrl" style="margin-right: 8px;">复制回填URL</i-button>
        <i-button :type="detail && detail.status === 0 ? 'primary' : 'default'" @click="toggleStatus">
          {{ detail && detail.status === 0 ? '标记已用' : '标记未用' }}
        </i-button>
      </div>
    </modal>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.min.js"></script>
  <script src="https://unpkg.com/view-design@4.7.0/dist/iview.min.js"></script>
  <script src="app.js"></script>
</body>
</html>

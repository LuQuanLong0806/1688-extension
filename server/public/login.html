<!DOCTYPE html>
<html lang="zh-CN" data-theme="1688">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 商品采集管理平台</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="https://unpkg.com/view-design@4.7.0/dist/styles/iview.css">
  <link rel="stylesheet" href="css/theme-1688.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-base, #f4f5f7);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      position: relative;
      overflow: hidden;
    }
    .login-bg-decor {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle at 18% 22%, var(--accent-glow, rgba(255,106,0,.18)), transparent 45%),
        radial-gradient(circle at 82% 78%, var(--accent-glow, rgba(255,106,0,.18)), transparent 45%);
    }
    .login-bg-decor::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, var(--border, #e1e4e8) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: .35;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    }
    #app { position: relative; z-index: 1; width: 100%; display: flex; justify-content: center; padding: 20px; }
    .login-card {
      width: 400px;
      max-width: 100%;
      background: var(--bg-surface, #fff);
      border-radius: var(--radius-xl, 12px);
      box-shadow: 0 20px 60px rgba(0,0,0,.10), 0 2px 6px rgba(0,0,0,.04);
      overflow: hidden;
      border: 1px solid var(--border-subtle, #eef0f2);
      animation: login-card-in .4s cubic-bezier(.4,0,.2,1);
    }
    @keyframes login-card-in {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: none; }
    }
    .login-card-topbar {
      height: 4px;
      background: var(--accent-gradient, linear-gradient(135deg, #ff6a00, #ff9a44));
    }
    .login-body { padding: 36px 36px 28px; }
    .login-header { text-align: center; margin-bottom: 28px; }
    .login-logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 14px;
      border-radius: var(--radius-lg, 10px);
      background: var(--accent-gradient, linear-gradient(135deg, #ff6a00, #ff9a44));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-accent, 0 4px 14px rgba(255,106,0,.25));
    }
    .login-header h2 {
      color: var(--text-primary, #1a1a2e);
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: .3px;
    }
    .login-header p {
      color: var(--text-muted, #9ea3b0);
      font-size: 13px;
    }
    .login-field { margin-bottom: 18px; }
    .login-field label {
      display: block;
      font-size: 13px;
      color: var(--text-secondary, #555770);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-icon {
      position: absolute;
      left: 12px;
      width: 16px;
      height: 16px;
      color: var(--text-muted, #9ea3b0);
      display: flex;
      align-items: center;
      pointer-events: none;
      transition: color var(--transition, .25s);
      z-index: 1;
    }
    .input-wrap:focus-within .input-icon { color: var(--accent, #ff6a00); }
    .input-wrap input {
      width: 100%;
      height: 42px;
      padding: 0 12px 0 38px;
      border: 1px solid var(--border, #e1e4e8);
      border-radius: var(--radius-sm, 6px);
      font-size: 14px;
      color: var(--text-primary, #1a1a2e);
      background: var(--bg-surface, #fff);
      outline: none;
      transition: border-color var(--transition, .25s), box-shadow var(--transition, .25s);
    }
    .input-wrap input:focus {
      border-color: var(--accent, #ff6a00);
      box-shadow: 0 0 0 2px var(--accent-glow, rgba(255,106,0,.18));
    }
    .input-wrap.has-toggle input { padding-right: 40px; }
    .pwd-toggle {
      position: absolute;
      right: 6px;
      width: 30px;
      height: 30px;
      background: transparent;
      border: none;
      border-radius: var(--radius-xs, 4px);
      color: var(--text-muted, #9ea3b0);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color var(--transition, .25s), background var(--transition, .25s);
      z-index: 1;
    }
    .pwd-toggle:hover {
      color: var(--accent, #ff6a00);
      background: var(--accent-subtle, rgba(255,106,0,.05));
    }
    .pwd-toggle svg { width: 16px; height: 16px; }
    .login-btn {
      width: 100%;
      height: 44px;
      border: none;
      border-radius: var(--radius-sm, 6px);
      background: var(--accent-gradient, linear-gradient(135deg, #ff6a00, #ff9a44));
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity var(--transition, .25s), transform var(--transition, .25s), box-shadow var(--transition, .25s);
      margin-top: 4px;
      letter-spacing: 1px;
      box-shadow: var(--shadow-accent, 0 4px 14px rgba(255,106,0,.25));
    }
    .login-btn:hover:not(:disabled) { opacity: .95; transform: translateY(-1px); }
    .login-btn:active:not(:disabled) { transform: translateY(0); opacity: 1; }
    .login-btn:disabled { opacity: .5; cursor: not-allowed; }
    .login-error {
      color: var(--danger, #ff4d4f);
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      min-height: 20px;
    }
    .login-must-change {
      background: var(--warning-bg, rgba(255,153,0,.06));
      border: 1px solid var(--warning, #ff9900);
      border-left: 3px solid var(--warning, #ff9900);
      border-radius: var(--radius-sm, 6px);
      padding: 10px 12px;
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--text-secondary, #555770);
    }
    .login-footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border-subtle, #eef0f2);
      text-align: center;
      font-size: 11px;
      color: var(--text-muted, #9ea3b0);
      letter-spacing: .3px;
    }
    @media (max-width: 440px) {
      .login-card { width: 100%; }
      .login-body { padding: 28px 22px 22px; }
    }
  </style>
</head>
<body>
  <div class="login-bg-decor"></div>
  <div id="app">
    <div class="login-card">
      <div class="login-card-topbar"></div>
      <div class="login-body">
        <div class="login-header">
          <div class="login-logo">
            <svg viewBox="0 0 32 32" width="36" height="36">
              <path d="M10 12V10a6 6 0 0112 0v2" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
              <rect x="7" y="12" width="18" height="13" rx="2" fill="#fff" opacity=".95"/>
              <circle cx="16" cy="18.5" r="1.5" fill="#ff6a00"/>
            </svg>
          </div>
          <h2>商品采集管理平台</h2>
          <p>请登录您的账户</p>
        </div>
        <div class="login-must-change" v-if="mustChange">
          首次登录请修改默认密码
        </div>
        <div class="login-field">
          <label>用户名</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input type="text" v-model="username" placeholder="请输入用户名" @keyup.enter="login">
          </div>
        </div>
        <div class="login-field">
          <label>密码</label>
          <div class="input-wrap has-toggle">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
            </span>
            <input :type="showPwd ? 'text' : 'password'" v-model="password" placeholder="请输入密码" @keyup.enter="login">
            <button type="button" class="pwd-toggle" @click="showPwd = !showPwd" :title="showPwd ? '隐藏密码' : '显示密码'">
              <svg v-if="showPwd" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
              <svg v-else viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="login-field" v-if="mustChange">
          <label>新密码</label>
          <div class="input-wrap has-toggle">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
            </span>
            <input :type="showNewPwd ? 'text' : 'password'" v-model="newPassword" placeholder="请输入新密码（至少6位）" @keyup.enter="login">
            <button type="button" class="pwd-toggle" @click="showNewPwd = !showNewPwd" :title="showNewPwd ? '隐藏密码' : '显示密码'">
              <svg v-if="showNewPwd" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
              <svg v-else viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button class="login-btn" @click="login" :disabled="loading">
          {{ loading ? '登录中...' : (mustChange ? '修改密码并登录' : '登 录') }}
        </button>
        <div class="login-error">{{ error }}</div>
        <div class="login-footer">© 2026 商品采集管理平台 · v1.0</div>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/vue@2.7.16/dist/vue.min.js"></script>
  <script>
    new Vue({
      el: '#app',
      data: { username: '', password: '', newPassword: '', loading: false, error: '', mustChange: false, token: '', showPwd: false, showNewPwd: false },
      mounted: function () {
        var saved = localStorage.getItem('jwt_token');
        if (saved) {
          fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + saved } })
            .then(function (r) { return r.json(); })
            .then(function (d) {
              if (d.id) window.location.href = '/';
            }).catch(function () {});
        }
      },
      methods: {
        login: function () {
          var vm = this;
          vm.error = '';
          if (!vm.username || !vm.password) { vm.error = '请输入用户名和密码'; return; }
          if (vm.mustChange && (!vm.newPassword || vm.newPassword.length < 6)) { vm.error = '新密码至少6个字符'; return; }
          vm.loading = true;
          fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: vm.username, password: vm.password })
          }).then(function (r) { return r.json(); })
            .then(function (d) {
              vm.loading = false;
              if (d.error) { vm.error = d.error; return; }
              if (d.user && d.user.must_change_password) {
                vm.mustChange = true;
                vm.token = d.token;
                return;
              }
              localStorage.setItem('jwt_token', d.token);
              localStorage.setItem('jwt_user', JSON.stringify(d.user));
              window.location.href = '/';
            }).catch(function () { vm.loading = false; vm.error = '网络错误'; });
          if (vm.mustChange && vm.token) {
            fetch('/api/change-password', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + vm.token },
              body: JSON.stringify({ oldPassword: vm.password, newPassword: vm.newPassword })
            }).then(function (r) { return r.json(); })
              .then(function (d) {
                vm.loading = false;
                if (d.error) { vm.error = d.error; return; }
                localStorage.setItem('jwt_token', d.token);
                window.location.href = '/';
              }).catch(function () { vm.loading = false; vm.error = '网络错误'; });
          }
        }
      }
    });
  </script>
</body>
</html>
